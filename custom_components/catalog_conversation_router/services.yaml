rebuild_catalog:
  name: Rebuild catalog
  description: Force a full catalog rebuild for all configured entries.

get_catalog_stats:
  name: Get catalog stats
  description: Return catalog revision and item counts for each config entry.

test_utterance:
  name: Test utterance
  description: Dry-run an utterance through the routing pipeline without executing actions.
  fields:
    text:
      name: Text
      description: User utterance to test.
      required: true
      selector:
        text:
    area:
      name: Area override
      description: Optional area name to use for area-aware matching during the dry run.
      required: false
      selector:
        text:

dump_catalog:
  name: Dump catalog
  description: Return full catalog contents for each config entry.


dump_catalog_to_file:
  name: Dump catalog to file
  description: Write the full catalog contents for each config entry to a JSON file under /config.
  fields:
    path:
      name: File name
      description: Optional file name to write under /config. Defaults to catalog_router_catalog.json.
      required: false
      selector:
        text:
