rebuild_catalog:
  name: Rebuild catalog
  description: Force a full catalog rebuild for all configured entries.

get_catalog_stats:
  name: Get catalog stats
  description: Return catalog revision and item counts for each config entry.

test_utterance:
  name: Test utterance
  description: Dry-run an utterance through the routing pipeline and return the full decision trace without writing a file.
  fields:
    text:
      name: Text
      description: User utterance to test.
      required: true
      selector:
        text:
    area:
      name: Area override
      description: Optional synthetic area override. Prefer `satellite_id` or `device_id` to reproduce live satellite/device locality, including SuperArea resolution.
      required: false
      selector:
        text:
    device_id:
      name: Device ID
      description: Optional Home Assistant device id to use for origin area and SuperArea resolution during the dry run.
      required: false
      selector:
        text:
    satellite_id:
      name: Satellite entity ID
      description: Optional satellite entity id to use for origin area and SuperArea resolution during the dry run.
      required: false
      selector:
        text:
    execute_branches:
      name: Execute branches
      description: Optional. When true, actually call downstream local and LLM branches while still recording the full decision tree.
      required: false
      selector:
        boolean:

test_utterance_to_file:
  name: Test utterance to file
  description: Preferred debugging service. Dry-run an utterance through the routing pipeline and write the full decision trace to a JSON file under /config.
  fields:
    text:
      name: Text
      description: User utterance to test.
      required: true
      selector:
        text:
    area:
      name: Area override
      description: Optional synthetic area override. Prefer `satellite_id` or `device_id` to reproduce live satellite/device locality, including SuperArea resolution.
      required: false
      selector:
        text:
    device_id:
      name: Device ID
      description: Optional Home Assistant device id to use for origin area and SuperArea resolution during the dry run.
      required: false
      selector:
        text:
    satellite_id:
      name: Satellite entity ID
      description: Optional satellite entity id to use for origin area and SuperArea resolution during the dry run.
      required: false
      selector:
        text:
    execute_branches:
      name: Execute branches
      description: Optional. When true, actually call downstream local and LLM branches while still recording the full decision tree.
      required: false
      selector:
        boolean:
    path:
      name: File name
      description: Optional file name to write under /config. Defaults to catalog_router_test_utterance.json.
      required: false
      selector:
        text:

dump_catalog:
  name: Dump catalog
  description: Return full catalog contents for each config entry.


dump_catalog_to_file:
  name: Dump catalog to file
  description: Write the full catalog contents for each config entry to a JSON file under /config.
  fields:
    path:
      name: File name
      description: Optional file name to write under /config. Defaults to catalog_router_catalog.json.
      required: false
      selector:
        text:
